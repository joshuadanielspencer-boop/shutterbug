name: Deploy to GitHub Pages

# Builds the app and publishes dist/ to GitHub Pages on every push to main.
# For a PROJECT site (https://<user>.github.io/<repo>/) the site lives under a
# subpath, so we build with BASE_PATH=/<repo>/ to prefix every asset + the PWA
# scope. If you instead use a USER site repo named <user>.github.io (served at the
# domain root), delete the BASE_PATH env below so it builds with base "/".
#
# One-time setup: push this repo to GitHub, then in Settings → Pages set
# "Build and deployment → Source" to "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24   # match the dev machine, so npm's lockfile solver agrees
          cache: npm
      - run: npm ci
      - run: npm test
      - name: Build
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
